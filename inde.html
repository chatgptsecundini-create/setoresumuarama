<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<title>WebGIS Epidemiológico</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body, #map{
height:100%;
margin:0;
padding:0;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([-23.76,-53.31],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

fetch('limites_setores_lookerstudio.geojson')
.then(response => response.json())
.then(data => {

L.geoJSON(data,{

style:function(feature){

return{
color:'red',
weight:2,
fillColor:'orange',
fillOpacity:0.4
};

}

}).addTo(map);

});

</script>

</body>
</html>
