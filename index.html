<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<title>WebGIS Epidemiológico</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body, #map{
height:100%;
margin:0;
padding:0;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([-23.76,-53.31],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

fetch('limites_setores_lookerstudio.geojson')
.then(response => response.json())
.then(data => {

L.geoJSON(data,{

style:function(feature){

return{
color:'red',
weight:2,
fillColor:'orange',
fillOpacity:0.4
};

}

}).addTo(map);

});

fetch('https://script.google.com/macros/s/AKfycbxT541suXiFwiGT2gkNTNe4E3MkigLeQJVzARb51wzuiTo9mwJ8_OCCJ6f7JjOaMKi7/exec')
.then(response => response.json())
.then(data => {

data.forEach(function(item){

var lat = parseFloat(item.latitude);

var lon = parseFloat(item.longitude);

var ovos = Number(item.ovos);

if(!isNaN(lat) && !isNaN(lon)){

var intensidade = Math.min(ovos / 1000, 1);

var vermelho = Math.floor(255 * intensidade);

var verde = Math.floor(255 * (1 - intensidade));

var cor = `rgb(${vermelho},${verde},0)`;

L.circleMarker([lat,lon],{

radius: Math.sqrt(ovos) / 3,

fillColor: cor,

color:'black',

weight:1,

fillOpacity:0.8

})
.addTo(map)
.bindPopup(

'<b>Armadilha:</b> ' + item.armadilha +
'<br><b>Ovos:</b> ' + ovos

);

}

});

});

</script>

</body>
</html>
