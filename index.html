<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<title>WebGIS Epidemiológico</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body, #map{
height:100%;
margin:0;
padding:0;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([-23.76,-53.31],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

fetch('limites_setores_lookerstudio.geojson')
.then(response => response.json())
.then(data => {

L.geoJSON(data,{

style:function(feature){

return{
color:'red',
weight:2,
fillColor:'orange',
fillOpacity:0.4
};

}

}).addTo(map);

});

  fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vRAwLjFi-rxOhIsqPtXG2smvKDhHl7pSskDkEHvn53XSgHhUmr2x4i_SGRAhxDmPUbnN2v5vwgblvQx/pub?output=csv')
.then(response => response.text())
.then(csv => {

var linhas = csv.split('\n');

for(var i = 1; i < linhas.length; i++){

var col = linhas[i].split(',');

var lat = parseFloat(col[15]);
var lon = parseFloat(col[14]);
var ovos = parseFloat(col[1]);

if(!isNaN(lat) && !isNaN(lon)){

L.circleMarker([lat,lon],{

radius: ovos / 5,
fillColor:'green',
color:'black',
weight:1,
fillOpacity:0.7

})
.addTo(map)
.bindPopup(
'<b>Ovos:</b> ' + ovos
);

}

}

});

</script>

</body>
</html>
